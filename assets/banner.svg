<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="50%" stop-color="#16213E"/>
      <stop offset="100%" stop-color="#0F3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8784A"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#E8784A">
    <line x1="0" y1="80" x2="1200" y2="80" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke-width="1"/>
  </g>

  <!-- Decorative nodes (workflow feel) -->
  <g opacity="0.15">
    <rect x="60" y="60" width="120" height="50" rx="8" fill="#E8784A" opacity="0.3"/>
    <rect x="60" y="60" width="120" height="50" rx="8" stroke="#E8784A" stroke-width="1.5" fill="none"/>
    <rect x="240" y="140" width="120" height="50" rx="8" fill="#E8784A" opacity="0.3"/>
    <rect x="240" y="140" width="120" height="50" rx="8" stroke="#E8784A" stroke-width="1.5" fill="none"/>
    <rect x="100" y="280" width="120" height="50" rx="8" fill="#E8784A" opacity="0.3"/>
    <rect x="100" y="280" width="120" height="50" rx="8" stroke="#E8784A" stroke-width="1.5" fill="none"/>
    <path d="M180 85 Q210 85 240 165" stroke="#E8784A" stroke-width="1.5" fill="none"/>
    <path d="M240 165 Q200 230 220 305" stroke="#E8784A" stroke-width="1.5" fill="none"/>
    <rect x="950" y="80" width="120" height="50" rx="8" fill="#D4A574" opacity="0.2"/>
    <rect x="950" y="80" width="120" height="50" rx="8" stroke="#D4A574" stroke-width="1.5" fill="none"/>
    <rect x="1020" y="200" width="120" height="50" rx="8" fill="#D4A574" opacity="0.2"/>
    <rect x="1020" y="200" width="120" height="50" rx="8" stroke="#D4A574" stroke-width="1.5" fill="none"/>
    <rect x="980" y="300" width="100" height="40" rx="8" fill="#4CAF50" opacity="0.2"/>
    <rect x="980" y="300" width="100" height="40" rx="8" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
    <path d="M1010 130 Q1040 170 1080 200" stroke="#D4A574" stroke-width="1.5" fill="none"/>
    <path d="M1080 250 Q1050 280 1030 300" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
    <text x="1005" y="326" font-family="monospace" font-size="14" fill="#4CAF50" font-weight="bold">PASS 92</text>
  </g>

  <!-- Main title -->
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#F5E6D3" filter="url(#glow)">n8n-workflow-tester</text>

  <!-- Accent line -->
  <rect x="420" y="160" width="360" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#D4A574">Safe MCP server for testing, scoring, and inspecting n8n workflows</text>

  <!-- Tags — high contrast, large text, solid pill backgrounds -->
  <g transform="translate(600, 265)" text-anchor="middle">
    <!-- MCP tag -->
    <rect x="-250" y="-17" width="110" height="38" rx="19" fill="#E8784A" opacity="0.4"/>
    <rect x="-250" y="-17" width="110" height="38" rx="19" stroke="#E8784A" stroke-width="2" fill="none"/>
    <text x="-195" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">MCP</text>

    <!-- n8n tag -->
    <rect x="-120" y="-17" width="110" height="38" rx="19" fill="#E8784A" opacity="0.4"/>
    <rect x="-120" y="-17" width="110" height="38" rx="19" stroke="#E8784A" stroke-width="2" fill="none"/>
    <text x="-65" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">n8n</text>

    <!-- Testing tag -->
    <rect x="10" y="-17" width="110" height="38" rx="19" fill="#D4A574" opacity="0.4"/>
    <rect x="10" y="-17" width="110" height="38" rx="19" stroke="#D4A574" stroke-width="2" fill="none"/>
    <text x="65" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">Testing</text>

    <!-- TypeScript tag -->
    <rect x="140" y="-17" width="130" height="38" rx="19" fill="#3178C6" opacity="0.5"/>
    <rect x="140" y="-17" width="130" height="38" rx="19" stroke="#5A9FD4" stroke-width="2" fill="none"/>
    <text x="205" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">TypeScript</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="375" width="1200" height="25" fill="#E8784A" opacity="0.12"/>
  <text x="600" y="393" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D4A574" opacity="0.8">Config-driven test suites  |  Tiered scoring  |  Execution traces  |  Node catalog  |  Claude &amp; OpenClaw compatible</text>
</svg>
